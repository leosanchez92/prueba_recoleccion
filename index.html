<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba puntos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Pequeños ajustes de posición que Bootstrap no cubre por defecto sobre mapas */
        .panel-toggle { top: 15px; right: 15px; z-index: 2; }
        .panel-form { bottom: 30px; left: 20px; z-index: 2; width: 280px; display: none; }
    </style>
</head>
<body class="bg-light">

<div id="map"></div>

<div class="panel-toggle position-absolute bg-white p-3 rounded-3 shadow-sm d-flex align-items-center">
    <div class="form-check form-switch m-0 fs-6">
        <input class="form-check-input style-cursor-pointer" type="checkbox" role="switch" id="edit-toggle">
        <label class="form-check-input-label fw-semibold text-secondary" for="edit-toggle" style="user-select: none;">Modo de Edición</label>
    </div>
</div>

<div id="form-panel" class="panel-form position-absolute card border-0 shadow-lg animate-fade-in">
    <div class="card-body p-4">
        <h5 class="card-title fw-bold text-dark mb-1">Ejemplo punto</h5>
        <div id="coords-display" class="text-muted small font-monospace mb-3">Texto persnalizable según requerimientos</div>
        
        <div class="mb-3">
            <label for="point-name" class="form-label text-uppercase text-secondary fw-bold" style="font-size: 11px;">Descripción evento</label>
            <input type="text" id="point-name" class="form-control form-control-sm" placeholder="Ej. Entrada Norte" autocomplete="off">
        </div>
        
        <div class="d-flex gap-2">
            <button id="cancel-point-btn" class="btn btn-sm btn-danger w-100 fw-semibold">CANCELAR</button>
            <button id="save-point-btn" class="btn btn-sm btn-success w-100 fw-semibold">GUARDAR</button>
        </div>
    </div>
</div>

<script>
      
      // Conexión SUPABASE

    const SUPABASE_URL = 'https://gvunllvmgrfkhknwtpco.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SKJF8lmnKiMFK9ZtWT7z_Q_e8dQBUKi';

    const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
    );  
  
    
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: [-70.64827, -33.45694], 
        zoom: 13
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-left');

// Cargar puntos desde SUPABASE

async function cargarPuntos() {

    const { data, error } = await supabaseClient
        .from('puntos')
        .select('*');

    if (error) {
        console.error('Error cargando puntos:', error);
        return;
    }

    console.log('Puntos cargados:', data);

    data.forEach(punto => {

      const lng = punto.geom.coordinates[0];
      const lat = punto.geom.coordinates[1];

        agregarMarcadorVerde(
            punto.id,
            punto.nombre,
            lng,
            lat
        );

    });

}

// Ejecutar cuando el mapa termine de cargar
map.on('load', () => {
    cargarPuntos();
});

    // Estado de la sesión
    let isEditing = false;
    let tempMarker = null; 
    let tempLng = null, tempLat = null;
    let clickEnMarcador = false; 
    const listaDePuntos = [];

    // Elementos del DOM
    const editToggle = document.getElementById('edit-toggle');
    const formPanel = document.getElementById('form-panel');
    const pointNameInput = document.getElementById('point-name');
    const coordsDisplay = document.getElementById('coords-display');
    const saveBtn = document.getElementById('save-point-btn');
    const cancelBtn = document.getElementById('cancel-point-btn');

    // Cambiar modo de edición con el Toggle
    editToggle.addEventListener('change', function() {
        isEditing = this.checked;
        map.getCanvas().style.cursor = isEditing ? 'crosshair' : '';
        if (!isEditing) resetFormulario();
    });

    // Clic en el mapa
    map.on('click', function(e) {
        if (clickEnMarcador) {
            clickEnMarcador = false; 
            return;
        }

        if (!isEditing) return;

        const { lng, lat } = e.lngLat;
        tempLng = lng;
        tempLat = lat;

        // Mostrar formulario usando clases de Bootstrap (d-block limpia el display)
        formPanel.style.display = 'block';
        //coordsDisplay.innerText = `POINT(${lng.toFixed(6)} ${lat.toFixed(6)})`;
        pointNameInput.focus();

        if (tempMarker) {
            tempMarker.setLngLat([lng, lat]);
        } else {
            tempMarker = new maplibregl.Marker({ color: "#dc3545" }) // Rojo de Bootstrap
                .setLngLat([lng, lat])
                .addTo(map);
        }
    });

    // --- ACCIÓN: GUARDAR PUNTO ---
saveBtn.addEventListener('click', function() {

    const name = pointNameInput.value.trim();

    if (!name) {
        alert("Por favor, escribe un nombre para el punto.");
        return;
    }

    const nuevoPunto = {

        nombre: name,
        lng: tempLng,
        lat: tempLat

    };

    guardarPuntoEnSupabase(nuevoPunto);

});

    // --- ACCIÓN: CANCELAR PUNTO ---
    cancelBtn.addEventListener('click', function() {
        resetFormulario();
    });

    // --- FUNCIÓN PARA INSTANCIAR MARCADORES ---
    function agregarMarcadorVerde(id, nombre, lng, lat) {
        const marker = new maplibregl.Marker({ color: "#198754" }) // Verde de Bootstrap
            .setLngLat([lng, lat])
            .setPopup(new maplibregl.Popup({ offset: 25 }).setHTML(`<b class="text-dark" style="font-family:sans-serif;">${nombre}</b>`))
            .addTo(map);

        marker.getElement().addEventListener('click', function() {
            clickEnMarcador = true;
        });
    }

// ==========================
// GUARDAR EN SUPABASE
// ==========================

async function guardarPuntoEnSupabase(punto) {

    const { data, error } = await supabaseClient
        .from('puntos')
        .insert([
            {
                nombre: punto.nombre,

                geom: {
                    type: 'Point',
                    coordinates: [punto.lng, punto.lat]
                }
            }
        ])
        .select();

    if (error) {

        console.error(
            'Error guardando punto:',
            error
        );

        alert('No se pudo guardar el punto');

        return;
    }

    console.log(
        'Punto guardado:',
        data
    );

    agregarMarcadorVerde(
        data[0].id,
        punto.nombre,
        punto.lng,
        punto.lat
    );

    resetFormulario();

}


    // Función para resetear el estado de edición
    function resetFormulario() {
        if (tempMarker) {
            tempMarker.remove();
            tempMarker = null;
        }
        tempLng = null;
        tempLat = null;
        pointNameInput.value = '';
        formPanel.style.display = 'none';
    }
</script>

</body>
</html>
